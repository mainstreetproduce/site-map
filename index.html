<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Main Street Produce Facility Site Map — Driver Guide</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: rgba(15, 20, 28, 0.92);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #e8eef5;
    --text-dim: #8a96a6;
    --accent: #ffd13b;
    --accent-glow: #ffd13b;
    --check-in: #00d9a3;
    --danger: #ff5577;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    touch-action: none;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #1a2332 0%, #0a0e14 70%);
  }

  canvas { display: block; outline: none; }

  /* Top header */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 14px 18px;
    background: linear-gradient(180deg, rgba(10,14,20,0.95) 0%, rgba(10,14,20,0) 100%);
    z-index: 10;
    pointer-events: none;
  }
  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 2px;
  }
  .header p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Legend bottom-left */
  .legend {
    position: fixed;
    bottom: 14px;
    left: 14px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 12px 14px;
    z-index: 10;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 11px;
    line-height: 1.7;
    max-width: 180px;
  }
  .legend-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .dot-checkin { background: var(--check-in); color: var(--check-in); }
  .dot-dock { background: var(--accent); color: var(--accent); }
  .dot-flow { background: #ffeb6b; color: #ffeb6b; }
  .dot-parking { background: #6db5ff; color: #6db5ff; }
  /* Line markers */
  .legend-line {
    width: 22px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .line-dock { background: var(--accent); color: var(--accent); }
  .line-flow { background: #ffffff; color: #ffffff; }

  /* Controls panel bottom-right */
  .controls {
    position: fixed;
    bottom: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .ctrl-btn {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:hover, .ctrl-btn:active {
    background: rgba(255, 209, 59, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Hint */
  .hint {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    transition: opacity 0.6s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .hint.fade { opacity: 0; }

  /* Tooltip popup */
  .tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text);
    z-index: 20;
    pointer-events: none;
    transform: translate(-50%, -130%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-title {
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 2px;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  @media (max-width: 480px) {
    .header { padding: 10px 14px; }
    .header h1 { font-size: 12px; }
    .legend { font-size: 10px; padding: 10px 12px; max-width: 150px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <p>Loading Site Map</p>
</div>

<div id="canvas-container"></div>

<div class="header">
  <h1>Main Street Produce Facility Site Map</h1>
  <p>Driver traffic flow & dock locations</p>
</div>

<div class="hint" id="hint">Drag to rotate · Pinch to zoom · Tap markers</div>

<div class="legend">
  <div class="legend-title">Legend</div>
  <div class="legend-row"><span class="legend-line line-dock"></span> Path to Docks (Enter)</div>
  <div class="legend-row"><span class="legend-line line-flow"></span> Traffic Flow (Exit)</div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="reset-btn" title="Reset View">⌂</button>
  <button class="ctrl-btn" id="top-btn" title="Top View">▤</button>
  <button class="ctrl-btn" id="angle-btn" title="Angled View">◭</button>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltip-title"></div>
  <div id="tooltip-body"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === SCENE SETUP ===
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
const DEFAULT_POS = new THREE.Vector3(0, 180, 220);
const ANGLED_POS = new THREE.Vector3(120, 140, 200);
const TOP_POS = new THREE.Vector3(0, 280, 0.1);
camera.position.copy(DEFAULT_POS);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// === LIGHTING ===
const ambient = new THREE.AmbientLight(0xb8c5d6, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff4e0, 1.1);
sun.position.set(80, 150, 60);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.left = -150;
sun.shadow.camera.right = 150;
sun.shadow.camera.top = 150;
sun.shadow.camera.bottom = -150;
sun.shadow.camera.near = 50;
sun.shadow.camera.far = 300;
sun.shadow.bias = -0.0005;
scene.add(sun);

const rim = new THREE.DirectionalLight(0x6db5ff, 0.3);
rim.position.set(-100, 50, -80);
scene.add(rim);

// === GROUND TEXTURE (satellite map) ===
const IMG_W = 1046;
const IMG_H = 1104;
const WORLD_W = 200;
const WORLD_H = WORLD_W * (IMG_H / IMG_W);

const textureLoader = new THREE.TextureLoader();
textureLoader.load('flow.jpg', (texture) => {
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const groundGeom = new THREE.PlaneGeometry(WORLD_W, WORLD_H);
  const groundMat = new THREE.MeshStandardMaterial({
    map: texture,
    roughness: 0.9,
    metalness: 0.0,
  });
  const ground = new THREE.Mesh(groundGeom, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('hint').classList.add('fade'), 4000);
});

// Pixel coords (0,0 top-left) → world coords centered on origin.
function imgToWorld(px, py) {
  const x = (px / IMG_W - 0.5) * WORLD_W;
  const z = (py / IMG_H - 0.5) * WORLD_H;
  return new THREE.Vector3(x, 0, z);
}

// === BUILDINGS ===
const buildings = [
  // 1. Top warehouse with solar panels
  {
    points: [[490, 315], [490, 190], [620, 190], [620, 315]],
    height: 8,
    color: 0xe8e8eb,
  },
  // 2. Cold storage building
  {
    points: [
      [350, 910], [350, 419], [430, 419], [430, 479],
      [520, 479], [520, 580], [500, 580], [500, 719],
      [560, 719], [560, 810], [470, 810], [470, 910]
    ],
    height: 8,
    color: 0xeeeef0,
  },
    // 3. Administration building
  {
    points: [
      [540, 600], [540, 520], [550, 520], [550, 510],
      [560, 510], [560, 520], [580, 520], [580, 550],
      [610, 550], [610, 570], [580, 570], [580, 600]
    ],
    height: 4,
    color: 0xe5e5e8,
  },
  // 4. Check-In building
  {
    points: [
      [570, 810], [570, 710], [620, 710], [620, 730], 
      [600, 730], [600, 810]
    ],
    height: 4,
    color: 0xe5e5e8,
  },
  // 5. Blues office
  {
    points: [
      [503, 695], [503, 681], [530, 681], [530, 695],
    ],
    height: 3,
    color: 0xe5e5e8,
  },
  // 6. Receiving building
  {
    points: [
      [534, 473], [534, 456], [576, 456], [576, 473],
    ],
    height: 4,
    color: 0xe5e5e8,
  },
  // 7. Building S
  {
    points: [
      [535, 102], [536, 63], [584, 69], [584, 102],
    ],
    height: 6,
    color: 0xe5e5e8,
  },
  // 8. Building S East Side
  {
    points: [
      [598, 103], [598, 72], [656, 76], [656, 103],
    ],
    height: 3,
    color: 0xe5e5e8,
  },
  // 9. Shop
  {
    points: [
      [426, 101], [426, 54], [504, 61], [504, 101],
    ],
    height: 5,
    color: 0xe5e5e8,
  },
  // 10. Shop Break
  {
    points: [
      [354, 102], [354, 53], [420, 53], [420, 102],
    ],
    height: 5,
    color: 0xe5e5e8,
  },
  // 11. Docks 1 - 5
  {
    points: [
      [472, 910], [472, 813], [596, 813], [596, 910],
    ],
    height: 1,
    color: 0xffd13b,
    opacity: 1,
    emissive: 0xffd13b,
  },
  // 12. Docks 6 & 7
  {
    points: [
      [350, 418], [350, 318], [384, 318], [384, 418],
    ],
    height: 1,
    color: 0xffd13b,
    opacity: 1,
    emissive: 0xffd13b,
  },
];

// === CYLINDERS ===
const cylinders = [
  {
    px: 515,
    py: 595,
    radius: 1.5,
    height: 8,
    color: 0xeeeef0,
  },
  {
    px: 515,
    py: 615,
    radius: 1.5,
    height: 8,
    color: 0xeeeef0,
  },
  {
    px: 515,
    py: 635,
    radius: 1.5,
    height: 8,
    color: 0xeeeef0,
  }
];

cylinders.forEach(c => {
  const worldPos = imgToWorld(c.px, c.py);
  const geom = new THREE.CylinderGeometry(c.radius, c.radius, c.height, 16);
  const mat = new THREE.MeshStandardMaterial({
    color: c.color,
    roughness: 0.7,
    metalness: 0.1,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(worldPos.x, c.height / 2, worldPos.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
});

// === AWNINGS ===
const awnings = [
  {
    corners: [
      { px: 490, py: 315 }, // front-left
      { px: 490, py: 450 }, // back-left
      { px: 620, py: 450 }, // back-right
      { px: 620, py: 315 }, // front-right
    ],
    pillarRadius: 0.3,
    pillarHeight: 4,
    pillarColor: 0x888888,
    roofHeight: 4,
    roofColor: 0xdddddd,
  },
];

awnings.forEach(a => {
  const pillarHeights = [8, 6, 6, 8]; // front-left, back-left, back-right, front-right
  
  a.corners.forEach((corner, index) => {
    const worldPos = imgToWorld(corner.px, corner.py);
    const pillarHeight = pillarHeights[index];
    const pillarGeom = new THREE.CylinderGeometry(a.pillarRadius, a.pillarRadius, pillarHeight, 8);
    const pillarMat = new THREE.MeshStandardMaterial({
      color: a.pillarColor,
      roughness: 0.7,
      metalness: 0.1,
    });
    const pillar = new THREE.Mesh(pillarGeom, pillarMat);
    pillar.position.set(worldPos.x, pillarHeight / 2, worldPos.z);
    pillar.castShadow = true;
    pillar.receiveShadow = true;
    scene.add(pillar);
  });

  const frontLeft = imgToWorld(a.corners[0].px, a.corners[0].py);
  const backLeft = imgToWorld(a.corners[1].px, a.corners[1].py);
  const backRight = imgToWorld(a.corners[2].px, a.corners[2].py);
  const frontRight = imgToWorld(a.corners[3].px, a.corners[3].py);

  const roofGeom = new THREE.BufferGeometry();
  const roofFrontHeight = 8;
  const roofBackHeight = 6;
  const roofDepth = 0.5;
  
  // Top surface vertices
  const topVertices = new Float32Array([
    frontLeft.x, roofFrontHeight, frontLeft.z,         // 0: top front-left
    backLeft.x, roofBackHeight, backLeft.z,            // 1: top back-left
    backRight.x, roofBackHeight, backRight.z,          // 2: top back-right
    frontRight.x, roofFrontHeight, frontRight.z,       // 3: top front-right
    // Bottom surface vertices (offset down by roofDepth)
    frontLeft.x, roofFrontHeight - roofDepth, frontLeft.z,         // 4: bottom front-left
    backLeft.x, roofBackHeight - roofDepth, backLeft.z,            // 5: bottom back-left
    backRight.x, roofBackHeight - roofDepth, backRight.z,          // 6: bottom back-right
    frontRight.x, roofFrontHeight - roofDepth, frontRight.z,       // 7: bottom front-right
  ]);
  
  const indices = new Uint32Array([
    // Top surface
    0, 1, 2,
    0, 2, 3,
    // Bottom surface
    4, 6, 5,
    4, 7, 6,
    // Front edge
    0, 3, 7,
    0, 7, 4,
    // Back edge
    1, 5, 6,
    1, 6, 2,
    // Left edge
    0, 4, 5,
    0, 5, 1,
    // Right edge
    3, 2, 6,
    3, 6, 7,
  ]);
  
  roofGeom.setAttribute('position', new THREE.BufferAttribute(topVertices, 3));
  roofGeom.setIndex(new THREE.BufferAttribute(indices, 1));
  roofGeom.computeVertexNormals();
  
  const roofMat = new THREE.MeshStandardMaterial({
    color: a.roofColor,
    roughness: 0.8,
    metalness: 0.0,
    side: THREE.DoubleSide,
  });
  const roof = new THREE.Mesh(roofGeom, roofMat);
  roof.castShadow = true;
  roof.receiveShadow = true;
  scene.add(roof);

  const roofEdges = new THREE.EdgesGeometry(roofGeom);
  const roofLineMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.85,
  });
  const roofLine = new THREE.LineSegments(roofEdges, roofLineMat);
  scene.add(roofLine);
});

buildings.forEach(b => {
  // Pixel-to-world: Y becomes -Z after rotateX(-PI/2)
  const shape = new THREE.Shape();
  b.points.forEach(([px, py], i) => {
    const wp = imgToWorld(px, py);
    if (i === 0) shape.moveTo(wp.x, -wp.z);
    else shape.lineTo(wp.x, -wp.z);
  });
  shape.closePath();

  const geom = new THREE.ExtrudeGeometry(shape, {
    depth: b.height,
    bevelEnabled: false,
  });
  geom.rotateX(-Math.PI / 2);

  const opacity = b.opacity ?? 1;
  const mat = new THREE.MeshStandardMaterial({
    color: b.color,
    emissive: b.emissive ?? 0x000000,
    emissiveIntensity: b.emissive ? 0.4 : 0,
    roughness: 0.7,
    metalness: 0.05,
    transparent: opacity < 1,
    opacity: opacity,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Wireframe edges aligned with the 2D outline
  const edges = new THREE.EdgesGeometry(geom);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.85,
  });
  const line = new THREE.LineSegments(edges, lineMat);
  scene.add(line);
});

// === FENCES ===
const fences = [
  {
    name: 'Front Fence',
    points: [
      [350, 911],
      [350, 950],
      [600, 970],
      [600, 951],
    ],
    closed: false,
    height: 4,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.7,
    posts: true,
  },
  {
    name: 'South Fence Docks 6 & 7',
    points: [
      [350, 418],
      [350, 232],
    ],
    closed: false,
    height: 4,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.7,
    posts: true,
  },
  {
    name: 'North Fence Docks 6 & 7',
    points: [
      [350, 170],
      [350, 40],
    ],
    closed: false,
    height: 4,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.7,
    posts: true,
  },
  {
    name: 'Middle Parking',
    points: [
      [720, 809],
      [730, 190],
    ],
    closed: false,
    height: 2,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.7,
    posts: true,
  },
  {
    name: 'Admin Fence',
    points: [
      [535, 519], [535, 484], [576, 484], [576, 511]
    ],
    closed: false,
    height: 3,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.4,
    posts: true,
  },
  {
    name: 'Front Gate',
    points: [
      [717, 987], [717, 951], [700,951], [717, 918],
    ],
    closed: true,
    height: 4,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.7,
    posts: true,
  },
  {
    name: 'Outer Fence',
    points: [
      [330, 1010], [260, 1000], [260, 30], [731, 80], 
      [820, 80], [810, 1010],
    ],
    closed: false,
    height: 4,
    thickness: 0.4,
    color: 0x888888,
    opacity: 0.7,
    posts: true,
  }
];

fences.forEach(fence => {
  const worldPoints = fence.points.map(([px, py]) => imgToWorld(px, py));

  const segments = [];
  for (let i = 0; i < worldPoints.length - 1; i++) {
    segments.push([worldPoints[i], worldPoints[i + 1]]);
  }
  if (fence.closed) {
    segments.push([worldPoints[worldPoints.length - 1], worldPoints[0]]);
  }

  const wallMat = new THREE.MeshStandardMaterial({
    color: fence.color,
    roughness: 0.7,
    metalness: 0.3,
    transparent: fence.opacity < 1,
    opacity: fence.opacity,
    side: THREE.DoubleSide,
  });

  segments.forEach(([a, b]) => {
    const dx = b.x - a.x;
    const dz = b.z - a.z;
    const length = Math.sqrt(dx * dx + dz * dz);
    if (length < 0.001) return;

    const geom = new THREE.BoxGeometry(length, fence.height, fence.thickness);
    const mesh = new THREE.Mesh(geom, wallMat);
    mesh.position.set((a.x + b.x) / 2, fence.height / 2, (a.z + b.z) / 2);
    mesh.rotation.y = -Math.atan2(dz, dx);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
  });

  if (fence.posts) {
    const postRadius = fence.thickness * 0.7;
    const postHeight = fence.height * 1.1;
    const postGeom = new THREE.CylinderGeometry(postRadius, postRadius, postHeight, 8);
    const postMat = new THREE.MeshStandardMaterial({
      color: 0x444444,
      roughness: 0.5,
      metalness: 0.4,
    });
    worldPoints.forEach(p => {
      const post = new THREE.Mesh(postGeom, postMat);
      post.position.set(p.x, postHeight / 2, p.z);
      post.castShadow = true;
      scene.add(post);
    });
  }
});

// === TRAFFIC FLOW PATHS ===
// Polyline waypoints with animated trucks traveling first → last.
// Reverse direction by flipping the points list. `numTrucks` sets density.
const flowPaths = [
  {
    name: 'Truck Parking → Docks 6 & 7',
    points: [
        [809, 1060], [290,980], [290, 200], [380, 200], [380, 310]
    ],
    color: 0xffd13b,
    numTrucks: 6,
  },
  {
    name: 'Truck Parking → Docks 1-5',
    points: [
      [670, 1038], [670, 870], [605, 870]
    ],
    color: 0xffd13b,
    numTrucks: 1,
  },

  // White paths = general (non-dock) circulation.
  {
    name: 'General traffic 1',
    points: [
      [672, 870], [765, 870], [765, 1021], [836, 1029], [1015, 1040]
    ],
    chevronPoints: [
      [672, 870], [765, 870]
    ],
    color: 0xffffff,
    numTrucks: 1,
    numChevrons: 1,
  },
  {
    name: 'General traffic 2',
    points: [
      [380, 198], [380, 160], [670, 160], [765, 160], [765, 1021],
      [836, 1029], [1015, 1040]
    ],
    color: 0xffffff,
    numTrucks: 5,
  },
];

// === BUILD CURVES + TRUCKS ===
// Curve-like API (getPointAt / getTangentAt) over straight segments — no smoothing.
function makePolyline(points) {
  const cumLen = [0];
  for (let i = 1; i < points.length; i++) {
    cumLen[i] = cumLen[i - 1] + points[i].distanceTo(points[i - 1]);
  }
  const total = cumLen[points.length - 1];
  return {
    length: total,
    getPointAt(t) {
      const target = t * total;
      for (let i = 1; i < points.length; i++) {
        if (target <= cumLen[i]) {
          const segLen = cumLen[i] - cumLen[i - 1];
          const local = segLen === 0 ? 0 : (target - cumLen[i - 1]) / segLen;
          return new THREE.Vector3().lerpVectors(points[i - 1], points[i], local);
        }
      }
      return points[points.length - 1].clone();
    },
    getTangentAt(t) {
      const target = t * total;
      for (let i = 1; i < points.length; i++) {
        if (target <= cumLen[i]) {
          return new THREE.Vector3().subVectors(points[i], points[i - 1]).normalize();
        }
      }
      const n = points.length;
      return new THREE.Vector3().subVectors(points[n - 1], points[n - 2]).normalize();
    },
  };
}

const TRUCK_DARK_MAT = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.85 });
const TRUCK_WHEEL_GEOM = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 8);
TRUCK_WHEEL_GEOM.rotateZ(Math.PI / 2);
const TRUCK_TRAILER_GEOM = new THREE.BoxGeometry(1.8, 2.0, 5.5);
const TRUCK_CAB_GEOM = new THREE.BoxGeometry(1.6, 1.7, 2.0);

function makeTruck(material) {
  const truck = new THREE.Group();
  [0.4, -3.8].forEach(z => {
    [-0.95, 0.95].forEach(x => {
      const w = new THREE.Mesh(TRUCK_WHEEL_GEOM, TRUCK_DARK_MAT);
      w.position.set(x, 0.4, z);
      w.castShadow = true;
      truck.add(w);
    });
  });

  const trailer = new THREE.Mesh(TRUCK_TRAILER_GEOM, material);
  trailer.position.set(0, 1.4, -2.0);
  trailer.castShadow = true;
  truck.add(trailer);

  const cab = new THREE.Mesh(TRUCK_CAB_GEOM, material);
  cab.position.set(0, 1.05, 1.2);
  cab.castShadow = true;
  truck.add(cab);

  return truck;
}

const trucks = [];

flowPaths.forEach(path => {
  const worldPoints = path.points.map(([px, py]) => imgToWorld(px, py));
  const curve = makePolyline(worldPoints);

  // Static line on the ground
  const lineGeom = new THREE.BufferGeometry().setFromPoints(
    worldPoints.map(p => new THREE.Vector3(p.x, 0.4, p.z))
  );
  const lineMat = new THREE.LineDashedMaterial({
    color: path.color,
    transparent: true,
    opacity: 0.35,
    dashSize: 2,
    gapSize: 1.5,
  });
  const flowLine = new THREE.Line(lineGeom, lineMat);
  flowLine.computeLineDistances();
  scene.add(flowLine);

  // Directional chevrons along the path (flat on ground, pointing in travel direction)
  const chevronShape = new THREE.Shape();
  chevronShape.moveTo(1.8, 0);
  chevronShape.lineTo(-0.9, 1.2);
  chevronShape.lineTo(-0.3, 0);
  chevronShape.lineTo(-0.9, -1.2);
  chevronShape.closePath();
  const chevronGeom = new THREE.ShapeGeometry(chevronShape);
  chevronGeom.rotateX(-Math.PI / 2);
  const chevronMat = new THREE.MeshBasicMaterial({
    color: path.color,
    transparent: true,
    opacity: 0.9,
    side: THREE.DoubleSide,
  });
  const chevronWorldPoints = (path.chevronPoints || path.points).map(([px, py]) => imgToWorld(px, py));
  const chevronCurve = makePolyline(chevronWorldPoints);
  const chevronSpacing = 20;
  const numChevrons = path.numChevrons ?? Math.max(2, Math.floor(chevronCurve.length / chevronSpacing));
  for (let i = 0; i < numChevrons; i++) {
    const t = (i + 0.5) / numChevrons;
    const pos = chevronCurve.getPointAt(t);
    const tan = chevronCurve.getTangentAt(t);
    const chevron = new THREE.Mesh(chevronGeom, chevronMat);
    chevron.position.set(pos.x, 0.5, pos.z);
    chevron.rotation.y = -Math.atan2(tan.z, tan.x);
    scene.add(chevron);
  }

  const truckMat = new THREE.MeshStandardMaterial({
    color: path.color,
    emissive: path.color,
    emissiveIntensity: 0.8,
    roughness: 0.4,
    metalness: 0.2,
  });

  for (let i = 0; i < path.numTrucks; i++) {
    const truck = makeTruck(truckMat);
    scene.add(truck);
    trucks.push({
      mesh: truck,
      material: truckMat,
      curve: curve,
      offset: i / path.numTrucks,
    });
  }
});

// === MARKERS (Docks, Check-In, Truck Parking) ===
const markers = [];

function createMarker({ x, y, label, sublabel, color, height = 18, isStart = false }) {
  const worldPos = imgToWorld(x, y);
  const group = new THREE.Group();
  group.position.copy(worldPos);

  const poleGeom = new THREE.CylinderGeometry(0.3, 0.3, height, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 0.6 });
  const pole = new THREE.Mesh(poleGeom, poleMat);
  pole.position.y = height / 2;
  group.add(pole);

  const orbGeom = new THREE.SphereGeometry(2.2, 24, 24);
  const orbMat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 1.2,
    roughness: 0.3,
  });
  const orb = new THREE.Mesh(orbGeom, orbMat);
  orb.position.y = height;
  orb.castShadow = true;
  group.add(orb);

  const ringGeom = new THREE.RingGeometry(3, 3.3, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.5;
  group.add(ring);

  const glowGeom = new THREE.CircleGeometry(5, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
  });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.y = 0.3;
  group.add(glow);

  // Sprite label
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 160;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(15, 20, 28, 0.92)';
  roundRect(ctx, 4, 4, 504, 152, 16);
  ctx.fill();
  ctx.strokeStyle = `#${color.toString(16).padStart(6,'0')}`;
  ctx.lineWidth = 3;
  roundRect(ctx, 4, 4, 504, 152, 16);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 52px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (sublabel) {
    ctx.fillText(label, 256, 56);
    ctx.font = '28px Inter, sans-serif';
    ctx.fillStyle = '#8a96a6';
    ctx.fillText(sublabel, 256, 112);
  } else {
    ctx.fillText(label, 256, 80);
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.y = height + 8;
  sprite.scale.set(28, 8.75, 1);
  sprite.renderOrder = 999;
  group.add(sprite);

  scene.add(group);
  markers.push({ group, orb, ring, label, sublabel, isStart });
  return group;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

createMarker({ x: 585, y: 795, label: 'CHECK IN', sublabel: 'Start here', color: 0x00d9a3, height: 22, isStart: true });
createMarker({ x: 365, y: 363, label: 'DOCKS 6 & 7', color: 0xffd13b, height: 18 });
createMarker({ x: 533, y: 865, label: 'DOCKS 1 – 5', color: 0xffd13b, height: 18 });
createMarker({ x: 922, y: 1070, label: 'TRUCK PARKING', sublabel: 'Parking area', color: 0x6db5ff, height: 16 });

// === CONTROLS ===
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 60;
controls.maxDistance = 800; // raised for mobile portrait framing
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.target.set(0, 0, 0);
controls.update();

// === RAYCASTING for marker tooltips ===
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const tooltipTitle = document.getElementById('tooltip-title');
const tooltipBody = document.getElementById('tooltip-body');

function onPointerMove(event) {
  const x = event.touches ? event.touches[0].clientX : event.clientX;
  const y = event.touches ? event.touches[0].clientY : event.clientY;
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  checkHover(x, y);
}

function checkHover(screenX, screenY) {
  raycaster.setFromCamera(pointer, camera);
  const orbs = markers.map(m => m.orb);
  const intersects = raycaster.intersectObjects(orbs);
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const marker = markers.find(m => m.orb === hit);
    if (marker) {
      tooltipTitle.textContent = marker.label;
      tooltipBody.textContent = marker.sublabel || (marker.isStart ? 'Begin route here' : 'Loading area');
      tooltip.style.left = screenX + 'px';
      tooltip.style.top = screenY + 'px';
      tooltip.classList.add('visible');
      document.body.style.cursor = 'pointer';
      return;
    }
  }
  tooltip.classList.remove('visible');
  document.body.style.cursor = 'default';
}

renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerdown', onPointerMove);

// === CAMERA PRESET BUTTONS ===
function animateCameraTo(targetPos, targetLook = new THREE.Vector3(0,0,0), duration = 800) {
  const startPos = camera.position.clone();
  const startLook = controls.target.clone();
  const startTime = performance.now();
  function step() {
    const t = Math.min((performance.now() - startTime) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
    camera.position.lerpVectors(startPos, targetPos, ease);
    controls.target.lerpVectors(startLook, targetLook, ease);
    controls.update();
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

document.getElementById('reset-btn').addEventListener('click', () => animateCameraTo(DEFAULT_POS));
document.getElementById('top-btn').addEventListener('click', () => animateCameraTo(TOP_POS));
document.getElementById('angle-btn').addEventListener('click', () => animateCameraTo(ANGLED_POS));

// Hidden: triple-click the legend to toggle a continuous 360° aerial orbit
let aerialRotation = false;
let aerialStartElapsed = 0;
let aerialStartAngle = 0;
const AERIAL_RADIUS = 280;
const AERIAL_HEIGHT = 180;
const AERIAL_SPEED = -0.25; // radians/sec (negative = counter-clockwise)
let legendClickCount = 0;
let legendClickTimer = null;
document.querySelector('.legend').addEventListener('click', () => {
  legendClickCount++;
  clearTimeout(legendClickTimer);
  legendClickTimer = setTimeout(() => { legendClickCount = 0; }, 600);
  if (legendClickCount >= 3) {
    legendClickCount = 0;
    aerialRotation = !aerialRotation;
    controls.enabled = !aerialRotation;
    if (aerialRotation) {
      aerialStartElapsed = clock.getElapsedTime();
      aerialStartAngle = Math.atan2(camera.position.z, camera.position.x);
    }
  }
});

// === ANIMATION LOOP ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  const speed = 12; // world units per second — same visual speed on every path
  trucks.forEach((a, i) => {
    let t = (a.offset + elapsed * speed / a.curve.length) % 1;
    const pos = a.curve.getPointAt(t);
    const tan = a.curve.getTangentAt(t);
    a.mesh.position.set(pos.x, 0, pos.z);
    const lookTarget = new THREE.Vector3(pos.x + tan.x, 0, pos.z + tan.z);
    a.mesh.lookAt(lookTarget);
    a.material.emissiveIntensity = 0.6 + Math.sin(elapsed * 3 + i) * 0.3;
  });

  markers.forEach((m, i) => {
    const pulse = (Math.sin(elapsed * 2.2 + i * 0.7) + 1) / 2;
    m.ring.scale.setScalar(1 + pulse * 0.4);
    m.ring.material.opacity = 0.6 - pulse * 0.45;
    m.orb.position.y = (m.orb.userData.baseY || (m.orb.position.y - (m.orb.userData.bob||0)));
    m.orb.userData.baseY = m.orb.userData.baseY || m.orb.position.y;
    m.orb.userData.bob = Math.sin(elapsed * 2 + i) * 0.5;
    m.orb.position.y = m.orb.userData.baseY + m.orb.userData.bob;
  });

  if (aerialRotation) {
    const angle = aerialStartAngle + (elapsed - aerialStartElapsed) * AERIAL_SPEED;
    camera.position.x = Math.cos(angle) * AERIAL_RADIUS;
    camera.position.z = Math.sin(angle) * AERIAL_RADIUS;
    camera.position.y = AERIAL_HEIGHT;
    camera.lookAt(controls.target);
  } else {
    controls.update();
  }
  renderer.render(scene, camera);
}

animate();

// === RESIZE ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Prevent context menu on long press (mobile)
window.addEventListener('contextmenu', e => e.preventDefault());
</script>
